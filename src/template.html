<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <title>Todo List</title>
</head>
<body>
    <div class="wrapper">
        <header class="top-panel">
            <div class="title">
                <h1>ToDo List</h1>
            </div>
            <div class="theme">

            </div>
            <button class="new-todo">+ New Todo</button>
        </header>
        <div class="panel-container">
            <div class="left-panel">
                <div class="all-items">
                    <h2 class="menu-title">All Todos</h2>
                    <div class="menu-choice">Everything</div>
                    <div class="menu-choice">Due today</div>
                    <div class="menu-choice">Due this week</div>
                </div>
                <div class="projects">
                    <h2 class="menu-title">Projects</h2>
                    <!-- give added projects the menu-choice class -->
                    <div class="project-btn">
                        <button>Add a Project</button>
                    </div>
                </div>
            </div>
            <div class="right-panel">
                <div class="todo-container"></div>
            </div>
        </div>
        <div class="footer"></div>
    </div>
</body>
</html>
