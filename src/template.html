<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <title>Todo List</title>
</head>
<body>
    <div class="wrapper">
        <div class="panel-container">
            <dialog class="todo-dialog">
                <form action="" method="" class="add-todo-form">
                    <fieldset>
                        <div class="dialog-header">
                            <legend>Add New Task</legend>
                            <span class="todo-dialog-close dialog-close">&times;</span>
                        </div>
                        <div>
                            <label for="todo-name">Title</label>
                            <input type="text" id="todo-name">
                        </div>
                        <div>
                            <label for="todo-details">Details</label>
                            <input type="text" id="todo-details">
                        </div>
                        <div>
                            <label for="todo-date">Due Date</label>
                            <input type="date" id="todo-date">
                        </div>
                        <div>
                            <label for="todo-project">Project</label>
                            <select name="project" id="todo-project">
                    
                            </select>
                        </div>
                        <div class="form-priority">
                            <p class="todo-priority">Task Priority</p>
                            <div class="radio-item">
                                <input type="radio" id="priority-high" name="priority" value="3">
                                <label for="priority-high">High</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="priority-med" name="priority" value="2" checked>
                                <label for="priority-med">Medium</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="priority-low" name="priority" value="1">
                                <label for="priority-low">Low</label>
                            </div>
                        </div>
                    </fieldset>
                    <div class="dialog-buttons">
                        <button type="submit" id="add-todo-submit">Save</button>
                    </div>
                </form>
            </dialog>
            <dialog class="project-dialog">
                <form action="" method="" class="add-project-form">
                    <fieldset>
                        <div class="dialog-header">
                            <legend>Add New Project</legend>
                            <div class="project-dialog-close dialog-close">&times;</div>
                        </div>
                        <div>
                            <label for="project-name">Project Name:</label>
                            <input type="text" id="project-name" required>
                        </div>
                    </fieldset>
                    <div class="dialog-buttons">
                        <button type="submit" id="add-project-submit">Save</button>
                    </div>
                </form>
            </dialog>
            <div class="left-panel">
                <div class="title">
                    <h1>To-Do-er</h1>
                </div>
                <div class="left-section" id="left-section-top">
                    <h2 class="menu-title">All Todos</h2>
                    <ul class="everything-menu">
                        <li class="menu-choice">
                            <span>Everything</span>
                        </li>
                        <li class="menu-choice">
                            <span>Due Today</span>
                        </li>
                        <li class="menu-choice">
                            <span>Due This Week</span>
                        </li>
                    </ul>
                </div>
                <div class="left-section" id="left-section-bottom">
                    <h2 class="menu-title">Projects</h2>
                    <!-- give added projects the menu-choice class, maybe make it a list -->
                     <ul class="project-menu">

                     </ul>
                    <div id="add-project-button">
                        <button>Add a Project</button>
                    </div>
                </div>
                <div class="left-buttons">
                    <div class="mode-toggle">

                    </div>
                    <div class="github-logo">

                    </div>
                </div>
            </div>
            <div class="right-panel">
                <div class="todo-container">
                    <div class="no-todo-text">You're not tracking anything yet. Click the <span class="default-text">+</span> to start getting organized.</div>
                    <div class="todo-item">

                    </div>
                </div>
                <button id="add-task-button">
                    <span>&plus;</span>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
