<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <title>Todo List</title>
</head>
<body>
    <div class="wrapper">
        <div class="panel-container">
            <dialog>
                <form action="" method="" class="add-todo-form">
                    <fieldset>
                        <legend>Add New Task</legend>
                        <div class="form-item" id="form-name">
                            <label for="todo-name">Title</label>
                            <input type="text" id="todo-name">
                        </div>
                        <div class="form-item" id="form-details">
                            <label for="todo-details">Details</label>
                            <input type="text" id="todo-details">
                        </div>
                        <div class="form-item" id="form-date">
                            <label for="todo-date">Due Date</label>
                            <input type="date" id="todo-date">
                        </div>
                        <div class="form-item" id="form-project">
                            <label for="todo-project">Project</label>
                            <select name="project" id="todo-project">
                    
                            </select>
                        </div>
                        <div class="form-priority">
                            <p class="todo-priority">Task Priority</p>
                            <div class="radio-item">
                                <input type="radio" id="priority-high" name="priority" value="high">
                                <label for="priority-high">High</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="priority-med" name="priority" value="med" checked>
                                <label for="priority-med">Medium</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="priority-low" name="priority" value="low">
                                <label for="priority-low">Low</label>
                            </div>
                        </div>
                    </fieldset>
                    <div class="modal-buttons">
                        <button type="submit" id="add-todo-submit">Save</button>
                        <button type="button" id="close-todo-submit">Close</button>
                    </div>
                </form>
            </dialog>
            <div class="left-panel">
                <div class="title">
                    <h1>To-Do-er</h1>
                </div>
                <div class="left-section">
                    <h2 class="menu-title">All Todos</h2>
                    <ul class="everything-menu">
                        <li class="menu-choice">
                            <span>Everything</span>
                        </li>
                        <li class="menu-choice">
                            <span>Due Today</span>
                        </li>
                        <li class="menu-choice">
                            <span>Due This Week</span>
                        </li>
                    </ul>
                </div>
                <div class="left-section">
                    <h2 class="menu-title">Projects</h2>
                    <!-- give added projects the menu-choice class, maybe make it a list -->
                     <ul class="project-menu">

                     </ul>
                    <div class="project-btn">
                        <button>Add a Project</button>
                    </div>
                </div>
                <div class="left-buttons">
                    <div class="mode-toggle">

                    </div>
                    <div class="github-logo">

                    </div>
                </div>
            </div>
            <div class="right-panel">
                <div class="todo-container">
                    <div class="todo-item">
                        <div class="todo-title">Title</div>
                        <div class="todo-details">Details</div>
                        <div class="todo-date">Due Date</div>
                        <div class="todo-priority">Priority</div>
                        <div class="todo-status">Status</div>
                    </div>
                </div>
                <button id="add-task-button">
                    <h1>+</h1>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
